
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outbreak Alert SL | National Health Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .theme-public {
            --brand-primary: #10b981;
            --brand-secondary: #0d9488;
            --brand-bg: #ecfdf5;
            --brand-glow: rgba(16, 185, 129, 0.15);
        }
        .theme-health-worker {
            --brand-primary: #0284c7;
            --brand-secondary: #0369a1;
            --brand-bg: #f0f9ff;
            --brand-glow: rgba(2, 132, 199, 0.15);
        }
        .theme-admin {
            --brand-primary: #334155;
            --brand-secondary: #0f172a;
            --brand-bg: #f8fafc;
            --brand-glow: rgba(51, 65, 85, 0.1);
        }

        .bg-brand-primary { background-color: var(--brand-primary); }
        .text-brand-primary { color: var(--brand-primary); }
        .border-brand-primary { border-color: var(--brand-primary); }
        .bg-brand-soft { background-color: var(--brand-bg); }

        .card-friendly {
            background: white;
            border-radius: 2rem;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-friendly:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px var(--brand-glow);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .vigilance-pattern {
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .vigilance-pattern-dark {
            background-image: radial-gradient(rgba(255,255,255,0.1) 0.5px, transparent 0.5px);
            background-size: 32px 32px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.42.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",

    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body class="theme-public">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
